{% extends "admin/base.html" %}
{% block title %}{{ "Edit Photo" if image else "Upload Photo" }}{% endblock %}
{% block content %}

<div class="max-w-2xl">
  <h1 class="text-2xl font-bold text-slate-800 mb-6">{{ "Edit Photo" if image else "Upload Photo" }}</h1>

  <form method="post" enctype="multipart/form-data"
        action="{{ '/admin/gallery/' ~ image.id ~ '/edit' if image else '/admin/gallery/new' }}"
        class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1.5">Title</label>
      <input type="text" name="title" value="{{ image.title if image else '' }}" required
             class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1.5">Description (optional)</label>
      <textarea name="description" rows="3"
                class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y">{{ image.description or '' if image else '' }}</textarea>
    </div>
    <div class="grid sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Event Date</label>
        <input type="date" name="event_date" value="{{ image.event_date if image else '' }}" required
               class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Centre (optional)</label>
        <input type="text" name="centre" value="{{ image.centre or '' if image else '' }}"
               class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1.5">
        {{ "Replace Image (optional)" if image else "Image File" }}
      </label>
      {% if image %}
      <div class="mb-3">
        <img src="/static/gallery/{{ image.image_filename }}" alt="{{ image.title }}" class="h-32 rounded-lg border object-cover">
      </div>
      <input type="file" name="image_file" accept="image/*"
             class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
      {% else %}
      <input type="file" name="image_file" accept="image/*" required
             class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
      {% endif %}
    </div>
    <div class="flex items-center gap-3 pt-2">
      <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-lg font-medium transition">{{ "Update" if image else "Upload" }}</button>
      <a href="/admin/gallery" class="text-slate-500 hover:text-slate-700 text-sm">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
