{% extends "admin/base.html" %}
{% block title %}{{ "Edit Publication" if pub else "New Publication" }}{% endblock %}
{% block content %}

<div class="max-w-2xl">
  <h1 class="text-2xl font-bold text-slate-800 mb-6">{{ "Edit Publication" if pub else "New Publication" }}</h1>

  <form method="post" action="{{ '/admin/publications/' ~ pub.id ~ '/edit' if pub else '/admin/publications/new' }}" class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1.5">Title</label>
      <input type="text" name="title" value="{{ pub.title if pub else '' }}" required
             class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
      <textarea name="description" rows="4" required
                class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y">{{ pub.description if pub else '' }}</textarea>
    </div>
    <div class="grid sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Year</label>
        <input type="number" name="year" value="{{ pub.year if pub else '' }}" required min="1980" max="2030"
               class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Author / Editor</label>
        <input type="text" name="author_or_editor" value="{{ pub.author_or_editor or '' }}"
               class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
    <div class="flex items-center gap-3 pt-2">
      <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-lg font-medium transition">{{ "Update" if pub else "Create" }}</button>
      <a href="/admin/publications" class="text-slate-500 hover:text-slate-700 text-sm">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
