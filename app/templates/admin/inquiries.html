{% extends "admin/base.html" %}
{% block title %}Inquiries{% endblock %}
{% block content %}

<h1 class="text-2xl font-bold text-slate-800 mb-6">Contact Inquiries</h1>

<div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-gray-50 border-b text-left">
      <tr>
        <th class="px-5 py-3 font-semibold text-slate-600">Name</th>
        <th class="px-5 py-3 font-semibold text-slate-600">Email</th>
        <th class="px-5 py-3 font-semibold text-slate-600">Subject</th>
        <th class="px-5 py-3 font-semibold text-slate-600 w-28">Date</th>
      </tr>
    </thead>
    <tbody class="divide-y">
      {% for q in inquiries %}
      <tr class="hover:bg-gray-50 transition">
        <td class="px-5 py-3 font-medium">{{ q.name }}</td>
        <td class="px-5 py-3 text-blue-600">{{ q.email }}</td>
        <td class="px-5 py-3 text-slate-500">{{ q.subject }}</td>
        <td class="px-5 py-3 text-slate-400">{{ q.submitted_on }}</td>
      </tr>
      <tr class="bg-gray-50/50">
        <td colspan="4" class="px-5 py-3 text-slate-600 text-sm">{{ q.message }}</td>
      </tr>
      {% else %}
      <tr><td colspan="4" class="px-5 py-8 text-center text-slate-400">No inquiries yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
