{% extends "admin/base.html" %}
{% block title %}{{ "Edit Post" if post else "New Post" }}{% endblock %}
{% block content %}

<div class="max-w-2xl">
  <h1 class="text-2xl font-bold text-slate-800 mb-6">{{ "Edit Post" if post else "New Post" }}</h1>

  <form method="post" action="{{ '/admin/posts/' ~ post.id ~ '/edit' if post else '/admin/posts/new' }}" class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1.5">Title</label>
      <input type="text" name="title" value="{{ post.title if post else '' }}" required
             class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1.5">Body</label>
      <textarea name="body" rows="8" required
                class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y">{{ post.body if post else '' }}</textarea>
    </div>
    <div class="grid sm:grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Date</label>
        <input type="date" name="posted_on" value="{{ post.posted_on if post else '' }}" required
               class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Tag</label>
        <select name="tag" class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
          {% for t in ["", "Seminar", "Article", "Tribute", "Update", "Lecture", "Event", "Annual Lecture", "Conference"] %}
          <option value="{{ t }}" {% if post and post.tag == t %}selected{% endif %}>{{ t or "— None —" }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Link (optional)</label>
        <input type="url" name="link" value="{{ post.link or '' }}"
               class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
    <div class="flex items-center gap-3 pt-2">
      <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-lg font-medium transition">
        {{ "Update" if post else "Create" }}
      </button>
      <a href="/admin/posts" class="text-slate-500 hover:text-slate-700 text-sm">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
