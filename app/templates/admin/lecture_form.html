{% extends "admin/base.html" %}
{% block title %}{{ "Edit Lecture" if lecture else "New Lecture" }}{% endblock %}
{% block content %}

<div class="max-w-2xl">
  <h1 class="text-2xl font-bold text-slate-800 mb-6">{{ "Edit Lecture" if lecture else "New Lecture" }}</h1>

  <form method="post" action="{{ '/admin/lectures/' ~ lecture.id ~ '/edit' if lecture else '/admin/lectures/new' }}" class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
    <div class="grid sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Year</label>
        <input type="number" name="year" value="{{ lecture.year if lecture else '' }}" required min="1984" max="2030"
               class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Speaker</label>
        <input type="text" name="speaker" value="{{ lecture.speaker if lecture else '' }}" required
               class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1.5">Topic</label>
      <input type="text" name="topic" value="{{ lecture.topic or '' }}"
             class="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div class="flex items-center gap-3 pt-2">
      <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-lg font-medium transition">{{ "Update" if lecture else "Create" }}</button>
      <a href="/admin/lectures" class="text-slate-500 hover:text-slate-700 text-sm">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
