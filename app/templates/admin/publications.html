{% extends "admin/base.html" %}
{% block title %}Publications{% endblock %}
{% block content %}

<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-slate-800">Publications</h1>
  <a href="/admin/publications/new" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition">+ Add Publication</a>
</div>

<div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-gray-50 border-b text-left">
      <tr>
        <th class="px-5 py-3 font-semibold text-slate-600">Title</th>
        <th class="px-5 py-3 font-semibold text-slate-600 w-20">Year</th>
        <th class="px-5 py-3 font-semibold text-slate-600 w-28 text-right">Actions</th>
      </tr>
    </thead>
    <tbody class="divide-y">
      {% for pub in publications %}
      <tr class="hover:bg-gray-50 transition">
        <td class="px-5 py-3 font-medium">{{ pub.title }}</td>
        <td class="px-5 py-3 text-slate-500">{{ pub.year }}</td>
        <td class="px-5 py-3 text-right space-x-2">
          <a href="/admin/publications/{{ pub.id }}/edit" class="text-blue-600 hover:underline">Edit</a>
          <form method="post" action="/admin/publications/{{ pub.id }}/delete" class="inline" onsubmit="return confirm('Delete?')">
            <button type="submit" class="text-red-500 hover:underline">Delete</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="3" class="px-5 py-8 text-center text-slate-400">No publications yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
